services:
  - type: web
    name: dahmeria
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEFAULT_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: PROCESSING_MODE
        value: vision
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: GEMINI_API_KEY
        sync: false
